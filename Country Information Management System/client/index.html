<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Information Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    padding:10px 16px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:#1d4ed8;
}

.hidden{
    display:none;
}

.auth-buttons{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.country-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.country-card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,.1);
}

.country-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.country-card h3{
    margin:10px 0;
}

.logout-btn{
    background:red;
}
</style>
</head>

<body>

<div class="container">

    <h1>Country Information Management System</h1>

    <!-- AUTH SECTION -->
    <div id="authSection" class="card">

        <div class="auth-buttons">
            <button onclick="showLogin()">Login</button>
            <button onclick="showRegister()">Register</button>
        </div>

        <!-- LOGIN -->
        <div id="loginForm">
            <h2>Login</h2>

            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">

            <button onclick="login()">Login</button>
        </div>

        <!-- REGISTER -->
        <div id="registerForm" class="hidden">
            <h2>Register</h2>

            <input type="text" id="regName" placeholder="Name">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password">

            <button onclick="register()">Register</button>
        </div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">

        <div class="card">
            <h2>Dashboard</h2>

            <button class="logout-btn" onclick="logout()">
                Logout
            </button>

            <br><br>

            <input
                type="text"
                id="searchInput"
                placeholder="Search countries..."
                onkeyup="searchCountries()"
            >
        </div>

        <!-- ADD COUNTRY -->

        <div class="card">

            <h2>Add Country</h2>

            <input id="name" placeholder="Country Name">
            <input id="capital" placeholder="Capital">
            <input id="continent" placeholder="Continent">
            <input id="population" placeholder="Population">
            <input id="area" placeholder="Area">
            <input id="currency" placeholder="Currency">
            <input id="language" placeholder="Language">

            <textarea
                id="description"
                placeholder="Description"
            ></textarea>

            <input type="file" id="flag">

            <button onclick="addCountry()">
                Add Country
            </button>

        </div>

        <!-- COUNTRIES -->

        <div class="card">

            <h2>Countries</h2>

            <div
                id="countriesContainer"
                class="country-grid"
            ></div>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
