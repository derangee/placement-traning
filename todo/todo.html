<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.container{
    width:400px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

button{
    padding:12px 18px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    margin-bottom:10px;
    background:#f8f8f8;
    border-radius:8px;
}

.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.actions{
    display:flex;
    gap:8px;
}

.delete{
    background:#dc3545;
}

.delete:hover{
    background:#b02a37;
}

.done{
    background:#28a745;
}

.done:hover{
    background:#1f7a33;
}
</style>
</head>
<body>

<div class="container">
    <h1>Todo List</h1>

    <div class="input-box">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task..."
        >
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");

function addTask() {
    const taskText = taskInput.value.trim();

    if(taskText === "") return;

    const li = document.createElement("li");

    li.innerHTML = `
        <span>${taskText}</span>

        <div class="actions">
            <button class="done">✓</button>
            <button class="delete">✕</button>
        </div>
    `;

    const doneBtn = li.querySelector(".done");
    const deleteBtn = li.querySelector(".delete");
    const text = li.querySelector("span");

    doneBtn.addEventListener("click", () => {
        text.classList.toggle("completed");
    });

    deleteBtn.addEventListener("click", () => {
        li.remove();
    });

    taskList.appendChild(li);

    taskInput.value = "";
}

taskInput.addEventListener("keypress", (e) => {
    if(e.key === "Enter"){
        addTask();
    }
});
</script>

</body>
</html>
