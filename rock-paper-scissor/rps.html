<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #3b82f6, #ec4899);
            color: #fff;
        }

        .container {
            width: clamp(320px, 90vw, 500px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 32px;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 16px;
            font-size: 2rem;
            letter-spacing: 0.05em;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            margin: 24px 0;
            gap: 16px;
        }

        .scorebox {
            flex: 1;
            padding: 16px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .scorebox span {
            display: block;
            font-size: 0.9rem;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .scorebox strong {
            font-size: 2rem;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 24px 0;
        }

        button.choice {
            padding: 20px 12px;
            border: none;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 700;
            color: #111;
            background: #f8fafc;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
        }

        button.choice:hover {
            transform: translateY(-2px);
            background: #eff6ff;
        }

        .result {
            min-height: 72px;
            padding: 18px 16px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .result strong {
            display: block;
            margin-top: 8px;
            font-size: 1.2rem;
        }

        .footer {
            font-size: 0.9rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>

        <div class="scoreboard">
            <div class="scorebox">
                <span>Your score</span>
                <strong id="player-score">0</strong>
            </div>
            <div class="scorebox">
                <span>Computer score</span>
                <strong id="computer-score">0</strong>
            </div>
        </div>

        <div class="result" id="result">
            Pick rock, paper, or scissors to start.
        </div>

        <div class="choices">
            <button class="choice" data-choice="rock">Rock</button>
            <button class="choice" data-choice="paper">Paper</button>
            <button class="choice" data-choice="scissors">Scissors</button>
        </div>

        <div class="footer">First to 5 wins the game. Refresh to restart.</div>
    </div>

    <script>
        const choices = ["rock", "paper", "scissors"];
        const playerScoreEl = document.getElementById("player-score");
        const computerScoreEl = document.getElementById("computer-score");
        const resultEl = document.getElementById("result");
        let playerScore = 0;
        let computerScore = 0;

        function getComputerChoice() {
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function getRoundResult(player, computer) {
            if (player === computer) return "draw";
            if (
                (player === "rock" && computer === "scissors") ||
                (player === "paper" && computer === "rock") ||
                (player === "scissors" && computer === "paper")
            ) {
                return "win";
            }
            return "lose";
        }

        function formatChoice(choice) {
            return choice.charAt(0).toUpperCase() + choice.slice(1);
        }

        function updateResult(player, computer, outcome) {
            if (outcome === "draw") {
                resultEl.innerHTML = `Both chose ${formatChoice(player)}. It's a draw.`;
            } else if (outcome === "win") {
                resultEl.innerHTML = `You chose ${formatChoice(player)} and the computer chose ${formatChoice(computer)}. <strong>You win this round!</strong>`;
            } else {
                resultEl.innerHTML = `You chose ${formatChoice(player)} and the computer chose ${formatChoice(computer)}. <strong>You lose this round.</strong>`;
            }
        }

        function updateScores() {
            playerScoreEl.textContent = playerScore;
            computerScoreEl.textContent = computerScore;
        }

        function checkGameEnd() {
            if (playerScore === 5 || computerScore === 5) {
                const winner = playerScore === 5 ? "You win the game!" : "Computer wins the game.";
                resultEl.innerHTML = `${winner} Refresh the page to play again.`;
                document.querySelectorAll("button.choice").forEach(button => {
                    button.disabled = true;
                    button.style.cursor = "not-allowed";
                    button.style.opacity = "0.7";
                });
            }
        }

        document.querySelectorAll("button.choice").forEach(button => {
            button.addEventListener("click", () => {
                if (playerScore === 5 || computerScore === 5) return;

                const playerChoice = button.dataset.choice;
                const computerChoice = getComputerChoice();
                const outcome = getRoundResult(playerChoice, computerChoice);

                if (outcome === "win") playerScore += 1;
                else if (outcome === "lose") computerScore += 1;

                updateResult(playerChoice, computerChoice, outcome);
                updateScores();
                checkGameEnd();
            });
        });
    </script>
</body>
</html>
