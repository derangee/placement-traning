<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }
        .page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 24px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        .products {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }
        .card {
            background: #fff;
            border: 1px solid #d2d2d2;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 360px;
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin-bottom: 12px;
        }
        .card h2 {
            font-size: 16px;
            margin: 0 0 10px;
            line-height: 1.3;
        }
        .card p {
            font-size: 14px;
            margin: 0 0 12px;
            flex-grow: 1;
            color: #545454;
        }
        .card .price {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card .category {
            font-size: 12px;
            color: #767676;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .loading,
        .error {
            padding: 16px;
            background: #fff;
            border: 1px solid #d2d2d2;
            border-radius: 8px;
            max-width: 560px;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Simple Product Store</h1>
        <div id="status" class="loading">Loading products…</div>
        <div id="products" class="products"></div>
    </div>

    <script>
        const productsEl = document.getElementById('products');
        const statusEl = document.getElementById('status');

        fetch('https://fakestoreapi.com/products')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load products');
                return response.json();
            })
            .then(products => {
                statusEl.style.display = 'none';
                products.slice(0, 8).forEach(product => {
                    const card = document.createElement('article');
                    card.className = 'card';

                    card.innerHTML = `
                        <img src="${product.image}" alt="${product.title}">
                        <h2>${product.title}</h2>
                        <p>${product.description.slice(0, 100)}${product.description.length > 100 ? '…' : ''}</p>
                        <div class="price">$${product.price.toFixed(2)}</div>
                        <div class="category">${product.category}</div>
                    `;

                    productsEl.appendChild(card);
                });
            })
            .catch(error => {
                statusEl.textContent = 'Unable to load products.';
                statusEl.className = 'error';
                console.error(error);
            });
    </script>
</body>
</html>
